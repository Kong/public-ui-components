packages:
  - 'packages/*/*'

auditConfig:
  ignoreGhsas:
    - 'GHSA-p9ff-h696-f583'
    - 'GHSA-5xrq-8626-4rwp'
    - 'GHSA-gv7w-rqvm-qjhr'
    - 'GHSA-fx2h-pf6j-xcff'
# Require a package to be published at least 12 days (17280 minutes) before it can be installed
# minimumReleaseAge: 17280
minimumReleaseAgeExclude:
  - '@kong/*'
  - '@kong-ui/*'
  - '@kong-ui-public/*'

onlyBuiltDependencies:
  - '@evilmartians/lefthook'
  - '@parcel/watcher'
  - '@swc/core'
  - 'core-js'
  - 'core-js-pure'
  - 'cypress'
  - 'es5-ext'
  - 'esbuild'
  - nx
  - 'swagger-ui'
  - 'tree-sitter'
  - 'tree-sitter-json'
  - 'tree-sitter-yaml'
  - 'vue-demi'

overrides:
  axios@<1.15.0: '>=1.16.1'
  dompurify@<3.2.4: '>=3.4.9'
  fast-uri@<=3.1.1: '>=3.1.2'
  form-data@>=3.0.0 <3.0.4: '>=4.0.6'
  handlebars@>=4.0.0 <=4.7.8: '>=4.7.9'
  lodash-es@<=4.17.23: '>=4.18.0'
  lodash@<=4.17.23: '>=4.18.0'
  minimatch@>=9.0.0 <9.0.7: '>=10.2.5'
  path-to-regexp@<0.1.13: '>=8.4.2'
  picomatch@<2.3.2: '>=4.0.4'
  picomatch@>=4.0.0 <4.0.4: '>=4.0.4'
  serialize-javascript@<=7.0.2: '>=7.0.5'
  shell-quote@>=1.1.0 <=1.8.3: '>=1.8.4'
  tmp@<0.2.6: '>=0.2.7'
  ws@>=8.0.0 <8.21.0: '>=8.21.0'
# When set to no-downgrade, pnpm will fail if a package's trust level has decreased compared to previous releases
trustPolicy: no-downgrade
# Ignore policy if published at least 12 days (17280 minutes)
trustPolicyIgnoreAfter: 17280
